name: 🔒 Deadline Fase 1 - 30 Jun 2026

on:
  push:
    branches:
      - develop
  pull_request:
    branches:
      - develop
      - main

jobs:
  check-deadline:
    name: Verificar fecha límite de entrega
    runs-on: ubuntu-latest

    steps:
      - name: Comprobar si estamos dentro del plazo
        run: |
          # ─────────────────────────────────────────────
          # FASE 1  →  30 de junio de 2026 a las 12:00 (hora Ciudad de México, UTC-6)
          # En UTC equivale a las 18:00
          # ─────────────────────────────────────────────
          DEADLINE="2026-06-30T18:00:00"
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S")

          echo "🕐 Fecha/hora actual (UTC): $NOW"
          echo "📅 Fecha límite Fase 1 (UTC): $DEADLINE"

          if [[ "$NOW" > "$DEADLINE" ]]; then
            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║  ❌  FECHA LÍMITE DE FASE 1 SUPERADA             ║"
            echo "║                                                  ║"
            echo "║  No se aceptan nuevos commits en develop.        ║"
            echo "║  Contacta al administrador del repositorio       ║"
            echo "║  para autorizar cambios posteriores a la entrega ║"
            echo "╚══════════════════════════════════════════════════╝"
            exit 1
          else
            # Calcular tiempo restante
            DEADLINE_EPOCH=$(date -d "$DEADLINE" +%s 2>/dev/null || date -j -f "%Y-%m-%dT%H:%M:%S" "$DEADLINE" +%s)
            NOW_EPOCH=$(date -u +%s)
            DIFF=$(( DEADLINE_EPOCH - NOW_EPOCH ))
            HOURS=$(( DIFF / 3600 ))
            MINUTES=$(( (DIFF % 3600) / 60 ))

            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║  ✅  DENTRO DEL PLAZO — FASE 1                   ║"
            echo "║                                                  ║"
            printf "║  ⏳  Tiempo restante: %3d horas %2d minutos       ║\n" $HOURS $MINUTES
            echo "║  📌  Límite: 30 Jun 2026 · 12:00 CDMX            ║"
            echo "╚══════════════════════════════════════════════════╝"
          fi

      - name: Verificar que el autor del commit pertenece al equipo
        if: github.event_name == 'push'
        run: |
          AUTOR="${{ github.actor }}"
          echo "👤 Commit realizado por: $AUTOR"
          echo "✅ Verificación de autoría registrada."
